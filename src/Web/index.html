<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>DLsite 下载器</title>
<style>
  :root {
    --bg: #1b1b1f; --surface: #26262b; --surface2: #2f2f36; --line: #3a3a42;
    --text: #e8e8ea; --muted: #9a9aa3; --accent: #6aa3ff; --accent-dim: #4a78c0;
    --radius: 10px; --nav-w: 210px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif; font-size: 15px; line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
  button { font-family: inherit; }

  header {
    position: sticky; top: 0; z-index: 30; background: rgba(27,27,31,.96);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    padding: 8px max(12px, env(safe-area-inset-left));
  }
  .topbar { display: flex; align-items: center; gap: 8px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 14px; white-space: nowrap;
  }
  .icon-btn:hover { border-color: var(--accent-dim); }
  .icon-btn:disabled { opacity: .5; cursor: default; }
  .icon-btn[hidden] { display: none; }
  .icon-btn.primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
  .title { font-weight: 600; font-size: 16px; margin-right: auto;
           overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
  .grow { flex: 1 1 140px; }
  input, select {
    background: var(--surface2); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 7px 10px; font-size: 14px; outline: none; min-width: 0;
  }
  input:focus, select:focus { border-color: var(--accent); }

  /* ===== 左侧导航（对齐 WPF 左侧菜单）/ 移动端抽屉 ===== */
  .nav { position: fixed; left: 0; top: 0; bottom: 0; width: var(--nav-w); z-index: 40;
         background: var(--surface); border-right: 1px solid var(--line);
         display: flex; flex-direction: column; gap: 4px;
         padding: 12px 10px max(12px, env(safe-area-inset-bottom)); overflow-y: auto; }
  .nav .brand { font-weight: 700; font-size: 16px; padding: 6px 10px 14px; color: var(--text); }
  .navitem { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
             cursor: pointer; color: var(--muted); font-size: 14.5px; white-space: nowrap; }
  .navitem:hover { background: var(--surface2); color: var(--text); }
  .navitem.active { background: var(--accent-dim); color: #fff; }
  .navitem .ni { width: 20px; text-align: center; flex: none; }
  .main-wrap { margin-left: var(--nav-w); min-height: 100%; }
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 39; display: none; }
  #menuBtn { display: none; }

  /* 桌面 / 平板（Windows/macOS/iPadOS）：侧栏常驻；底部音频条从侧栏右侧开始 */
  .layout-desktop .drawer-backdrop { display: none !important; }
  .layout-desktop #menuBtn { display: none !important; }
  .layout-desktop .abar { left: var(--nav-w); }

  /* 移动端（iOS/Android 手机）：侧栏改为左侧抽屉，顶部左侧目录键、返回键移到右侧 */
  .layout-mobile .nav { width: 264px; transform: translateX(-100%);
                        transition: transform .22s ease; z-index: 60; box-shadow: 2px 0 18px rgba(0,0,0,.55); }
  .layout-mobile .nav.open { transform: translateX(0); }
  .layout-mobile .drawer-backdrop { z-index: 59; }
  .layout-mobile .drawer-backdrop.show { display: block; }
  .layout-mobile .main-wrap { margin-left: 0; }
  .layout-mobile #menuBtn { display: inline-block; order: 0; }
  .layout-mobile .topbar { flex-wrap: wrap; }
  .layout-mobile #title { order: 1; margin-right: auto; }
  .layout-mobile #back { order: 2; }
  .layout-mobile #search { order: 5; flex-basis: 100%; }
  .layout-mobile #sort { order: 6; }

  main { max-width: 1200px; margin: 0 auto; padding: 12px max(12px, env(safe-area-inset-left)) 40px; }
  .count { color: var(--muted); font-size: 13px; margin: 4px 2px 12px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }

  .grid { display: grid; gap: 12px; }
  .grid.cards { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .grid.groups { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
          overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: border-color .12s; }
  .card:hover { border-color: var(--accent-dim); }
  .group-card { padding: 14px; min-height: 92px; }
  .group-card .gt { font-weight: 600; font-size: 15px; word-break: break-word; }
  .group-card .gc { color: var(--muted); font-size: 13px; margin-top: 8px; }
  .cover { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #15151a; }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .badge { position: absolute; top: 6px; padding: 1px 7px; border-radius: 6px;
           background: rgba(0,0,0,.62); color: #f3f3f3; font-size: 11px; max-width: 70%;
           overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge.rj { left: 6px; } .badge.type { right: 6px; }
  .badge.lib { left: 6px; right: 6px; top: auto; bottom: 6px; max-width: none; text-align: center;
               background: rgba(110,110,122,.9); }
  .badge.as { left: 6px; right: 6px; top: auto; bottom: 6px; max-width: none; text-align: center; }
  /* 已在库作品：置灰降亮，仍可点击 */
  .card.dim { opacity: .5; filter: grayscale(.9); }
  .card.dim:hover { border-color: var(--line); }
  .card .wt { padding: 8px 10px 10px; font-size: 13.5px; font-weight: 500;
              display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .detail { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
  .detail h1 { font-size: 20px; margin: 0 0 12px; }
  .dtop { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.6fr); gap: 18px; align-items: start; }
  /* 单列时也必须用 minmax(0,1fr)：纯 1fr 的最小尺寸是 auto，会被图片固有宽度撑破、横向溢出 */
  @media (max-width: 720px) { .dtop { grid-template-columns: minmax(0, 1fr); } }
  .gallery { min-width: 0; }
  .gallery img.main { width: 100%; max-width: 100%; border-radius: 8px; background: #15151a; cursor: zoom-in; display: block; }
  .thumbs { display: flex; gap: 6px; overflow-x: auto; margin-top: 8px; }
  .thumbs img { height: 54px; border-radius: 5px; cursor: pointer; opacity: .65; border: 2px solid transparent; }
  .thumbs img.sel { opacity: 1; border-color: var(--accent); }
  .fields { display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; align-items: baseline; }
  .fields .k { color: var(--muted); font-size: 13px; white-space: nowrap; }
  .fields .v { word-break: break-word; }
  .tag { display: inline-block; margin: 0 8px 4px 0; }
  .actions { display: flex; gap: 8px; margin: 14px 0 4px; flex-wrap: wrap; }
  .toggle { background: var(--surface2); border: 1px solid var(--line); color: var(--text);
            border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 14px; }
  .toggle.on { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
  .body { margin-top: 16px; }
  .body p { white-space: pre-wrap; word-break: break-word; margin: 10px 0; }
  .body img { max-width: 100%; border-radius: 8px; margin: 10px 0; display: block; cursor: zoom-in; }

  /* 搜索 */
  .res { display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--line);
         border-radius: var(--radius); padding: 12px; margin-bottom: 10px; cursor: pointer; }
  .res:hover { border-color: var(--accent-dim); }
  .res img { width: 120px; height: 90px; object-fit: cover; border-radius: 6px; background: #15151a; flex: none; }
  .res .rt { font-weight: 600; margin-bottom: 4px; }
  .res .rm { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  .res .rs { color: var(--muted); font-size: 12.5px; white-space: pre-wrap;
             display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .host { display: flex; align-items: center; gap: 12px; background: var(--surface);
          border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .host.ok { cursor: pointer; } .host.ok:hover { border-color: var(--accent-dim); }
  .host .hn { font-weight: 600; } .host .hc { color: var(--muted); font-size: 13px; }
  .host .hs { margin-left: auto; font-size: 13px; }

  /* 帖子卡片（AS 列表内联自动扫描：抓链接 + 检测 + 直接下载） */
  .post { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
          padding: 12px; margin-bottom: 10px; }
  .post .phead { display: flex; gap: 12px; cursor: pointer; }
  .post .phead:hover .rt { color: var(--accent); }
  .post .phead img { width: 120px; height: 90px; object-fit: cover; border-radius: 6px; background: #15151a; flex: none; }
  .post .pinfo { flex: 1; min-width: 0; }
  .post .rstatus { font-size: 12.5px; font-weight: 600; white-space: nowrap; flex: none; }
  .rhosts { margin-top: 8px; }
  .rhosts .host { margin: 6px 0 0; background: var(--surface2); }

  /* 下载 */
  .dl { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
        padding: 12px 14px; margin-bottom: 10px; }
  .dl .row { display: flex; align-items: center; gap: 10px; }
  .dl .rj { font-weight: 600; cursor: pointer; }
  .dl .st { font-size: 13px; } .dl .sp { color: var(--muted); font-size: 12.5px; margin-left: auto; }
  .bar { height: 6px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }
  .children { margin-top: 10px; padding-left: 4px; display: none; }
  .children.open { display: block; }
  .frow { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 3px 0; color: var(--muted); }
  .frow .fn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .usage { margin-bottom: 12px; }
  .usage .ut { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; }

  /* 已下载表 */
  .dt { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .dt th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 10px; cursor: pointer;
           border-bottom: 1px solid var(--line); white-space: nowrap; position: sticky; top: 0; background: var(--bg); }
  .dt td { padding: 8px 10px; border-bottom: 1px solid var(--line); }
  .dt tr:hover td { background: var(--surface); }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px; }
  .mini { background: var(--surface2); border: 1px solid var(--line); color: var(--text);
          border-radius: 6px; padding: 3px 8px; font-size: 12px; cursor: pointer; }
  .mini.danger { color: #f87171; border-color: #6b3030; }
  .mini.danger:hover { border-color: #f87171; }
  .ferr { color: #f87171; font-size: 12px; padding: 0 0 6px 4px; word-break: break-word; }
  @media (max-width: 640px) { .dt .hide-sm { display: none; } }

  /* 设置 */
  .sec { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
         padding: 14px 16px; margin-bottom: 14px; }
  .sec h3 { margin: 0 0 12px; font-size: 15px; }
  .frm { display: grid; grid-template-columns: 140px 1fr; gap: 10px 14px; align-items: center; }
  @media (max-width: 560px) { .frm { grid-template-columns: 1fr; gap: 4px 0; } .frm label { margin-top: 8px; } }
  .frm label { color: var(--muted); font-size: 13.5px; }
  .frm input, .frm select { width: 100%; }
  .frm .ro { color: var(--muted); font-size: 13px; word-break: break-all; }
  .note { color: var(--muted); font-size: 12.5px; margin-top: 8px; }

  /* 文件树（查看作品） */
  .tree { font-size: 14px; }
  .trow { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  .trow:hover { background: var(--surface); }
  .trow .arrow { width: 14px; color: var(--muted); flex: none; }
  .trow .ticon { width: 20px; text-align: center; flex: none; }
  .trow .tname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trow.file .tname { color: var(--text); }
  .trow .tsize { color: var(--muted); font-size: 12.5px; flex: none; }

  /* 文件网格（查看作品：缩略图视图） */
  .fgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 10px; }
  .fcard { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; cursor: pointer; }
  .fcard:hover { border-color: var(--accent-dim); }
  .fthumb { width: 100%; aspect-ratio: 1 / 1; background: #15151a; position: relative;
            display: flex; align-items: center; justify-content: center; }
  .fthumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .fthumb .big { font-size: 40px; }
  .fthumb .fcount { position: absolute; right: 6px; bottom: 6px; background: rgba(0,0,0,.6);
                    color: #eee; border-radius: 6px; padding: 0 6px; font-size: 11px; }
  .fname { padding: 6px 8px; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 视频整页播放 */
  .voverlay { position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 65;
              display: none; flex-direction: column; }
  .voverlay.show { display: flex; }
  .vtop { display: flex; align-items: center; gap: 8px; padding: 10px max(12px, env(safe-area-inset-left)); flex: none; }
  .vtop .vtitle { flex: 1; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
  .voverlay video { flex: 1; min-height: 0; max-width: 96vw; max-height: 100%; background: #000; margin: 0 auto; }

  /* 底部音频条（两行布局：曲名 + 整宽进度条在上，控制按钮在下） */
  .abar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
          background: var(--surface); border-top: 1px solid var(--line);
          display: none; flex-direction: column; gap: 8px;
          padding: 10px max(12px, env(safe-area-inset-left)) max(10px, env(safe-area-inset-bottom)); }
  .abar.show { display: flex; }
  .abar .aname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 13px; }
  .abar audio { width: 100%; min-width: 0; height: 40px; }
  .abar .actrls { display: flex; align-items: center; gap: 8px; }
  .abar .actrls .spacer { flex: 1; }
  .icon-btn.on { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }

  /* 音频弹出层（播放列表 / 睡眠定时） */
  .apopup { position: fixed; right: 12px; left: 12px; bottom: 150px; z-index: 55; display: none;
            background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
            padding: 6px; min-width: 220px; max-width: 420px; margin-left: auto;
            max-height: calc(100vh - 170px); overflow-y: auto; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
  .apopup.show { display: block; }
  .sleep-input { display: flex; align-items: center; gap: 6px; padding: 6px 8px 8px; }
  .sleep-input input { flex: 1; }
  .sleep-input button { background: var(--accent-dim); border: 1px solid var(--accent-dim); color: #fff;
                        border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 14px; white-space: nowrap; }
  .aprow { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13.5px; }
  .aprow:hover { background: var(--surface2); }
  .aprow.cur { background: var(--accent-dim); color: #fff; }
  .aprow .apn { width: 22px; flex: none; text-align: center; color: var(--muted); }
  .aprow.cur .apn { color: #fff; }
  .aprow .apt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .apempty { padding: 14px; color: var(--muted); text-align: center; }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.93); z-index: 60;
              display: none; align-items: center; justify-content: center; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 96vw; max-height: 90vh; object-fit: contain; }
  .lb-btn { position: absolute; background: rgba(255,255,255,.1); border: none; color: #fff;
            font-size: 30px; padding: 10px 18px; cursor: pointer; border-radius: 8px; user-select: none; }
  .lb-prev { left: 12px; } .lb-next { right: 12px; } .lb-close { top: 12px; right: 12px; font-size: 22px; padding: 6px 14px; }

  .login { position: fixed; inset: 0; background: var(--bg); z-index: 80;
           display: none; align-items: center; justify-content: center; padding: 20px; }
  .login.show { display: flex; }
  .login .box { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
                padding: 24px; width: 100%; max-width: 320px; }
  .login h2 { margin: 0 0 14px; font-size: 18px; }
  .login input { width: 100%; margin-bottom: 12px; }
  .login button { width: 100%; background: var(--accent-dim); border: none; color: #fff;
                  padding: 10px; border-radius: 8px; cursor: pointer; font-size: 15px; }
  .login .err { color: #ff7a7a; font-size: 13px; min-height: 18px; margin-bottom: 6px; }
  .empty { color: var(--muted); text-align: center; padding: 50px 0; }
  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--line);
          border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -3px; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 70;
             display: none; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .overlay .card2 { background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
                    padding: 20px; max-width: 360px; width: 100%; }
  .overlay h3 { margin: 0 0 12px; font-size: 16px; }
</style>
</head>
<body>
<div id="drawerBackdrop" class="drawer-backdrop" onclick="closeDrawer()"></div>
<aside id="nav" class="nav"></aside>
<div class="main-wrap">
  <header>
    <div class="topbar">
      <button id="menuBtn" class="icon-btn" onclick="toggleDrawer()" title="目录" aria-label="目录">☰ 目录</button>
      <button id="back" class="icon-btn" hidden>← 返回</button>
      <span id="title" class="title">媒体库</span>
      <input id="search" class="grow" type="search" placeholder="搜索 RJ号 / 作品名 / 社团" autocomplete="off" hidden>
      <select id="sort" hidden></select>
    </div>
  </header>
  <main>
    <div id="count" class="count"></div>
    <div id="content"></div>
  </main>
</div>

<div id="lightbox" class="lightbox">
  <button class="lb-btn lb-close" onclick="LB.close()">✕</button>
  <button class="lb-btn lb-prev" onclick="LB.step(-1)">‹</button>
  <img id="lbimg" alt="">
  <button class="lb-btn lb-next" onclick="LB.step(1)">›</button>
</div>

<div id="picker" class="overlay"><div class="card2" id="pickerBox"></div></div>

<div id="videoOverlay" class="voverlay">
  <div class="vtop">
    <button class="icon-btn" id="vprev" onclick="videoPrev()">‹ 上一个</button>
    <button class="icon-btn" id="vnext" onclick="videoNext()">下一个 ›</button>
    <span id="vtitle" class="vtitle"></span>
    <button class="icon-btn" onclick="closeVideo()">✕ 关闭</button>
  </div>
  <video id="vplayer" controls playsinline></video>
</div>

<div id="audioBar" class="abar">
  <span id="aname" class="aname"></span>
  <audio id="aplayer" controls></audio>
  <div class="actrls">
    <button class="icon-btn" id="aprev" onclick="audioPrev()" title="上一曲">⏮</button>
    <button class="icon-btn" id="anext" onclick="audioNext()" title="下一曲">⏭</button>
    <span class="spacer"></span>
    <button class="icon-btn" id="aplaylistBtn" onclick="toggleAudioPlaylist()" title="播放列表">☰</button>
    <button class="icon-btn" id="asleepBtn" onclick="toggleSleepMenu()" title="睡眠定时">⏱</button>
    <button class="icon-btn" onclick="closeAudio()" title="关闭">✕</button>
  </div>
</div>
<div id="audioPlaylist" class="apopup"></div>
<div id="sleepMenu" class="apopup"></div>

<div id="login" class="login">
  <div class="box">
    <h2>需要访问密码</h2>
    <div id="loginErr" class="err"></div>
    <input id="pw" type="password" placeholder="密码" autocomplete="current-password">
    <button onclick="doLogin()">进入</button>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
const enc = encodeURIComponent;

// 复制文本到剪贴板：优先 navigator.clipboard（需 https/localhost），否则退回 execCommand（局域网 http 下可用）
function copyText(t) {
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(t).catch(() => fallbackCopy(t)); }
  else fallbackCopy(t);
}
function fallbackCopy(t) {
  const ta = document.createElement('textarea');
  ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch (e) { }
  document.body.removeChild(ta);
}

const SECTIONS = [
  { key: 'medialib', label: '媒体库', root: 'libs',     icon: '📚' },
  { key: 'download', label: '下载',                     icon: '⬇' },
  { key: 'search',   label: '搜索',                     icon: '🔍' },
  { key: 'tag',      label: '标签',   root: 'genres',   icon: '🏷' },
  { key: 'type',     label: '作品形式', root: 'types',   icon: '🎬' },
  { key: 'favorite', label: '收藏',   root: 'favorites', icon: '♥' },
  { key: 'settings', label: '设置',                     icon: '⚙' },
];
const MAKER_SORTS = ['作品数 多→少', '作品数 少→多', '社团名 A→Z'];
const WORK_SORTS  = ['发售日 新→旧', '发售日 旧→新', 'RJ号 新→旧', 'RJ号 旧→新'];
const AGE = { '1': '全年龄', '2': 'R-15', '3': 'R-18' };
const VIDEO_EXTS = ['.mp4', '.mkv', '.avi', '.wmv', '.mov', '.flv', '.webm', '.m4v', '.ts', '.mpg', '.mpeg'];
const AUDIO_EXTS = ['.mp3', '.wav', '.flac', '.m4a', '.aac', '.ogg', '.wma', '.opus'];
const IMG_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
const fileUrl = (id, rel) => `/api/file?id=${enc(id)}&path=${enc(rel)}`;

let section = 'medialib';
let stack = [];            // 卡片区导航栈
let curItems = [];         // 卡片区原始数据（本地搜索过滤）
let makerSort = 0, workSort = 0;
let pollTimer = null, usageTimer = null;

async function api(path) {
  const r = await fetch(path, { headers: { 'Accept': 'application/json' } });
  if (r.status === 401) { showLogin(false); throw new Error('unauth'); }
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
  if (r.status === 401) { showLogin(false); throw new Error('unauth'); }
  return r.json();
}

// ---------- 登录 ----------
function showLogin(initial) { $('login').classList.add('show'); if (!initial) $('loginErr').textContent = '会话已失效，请重新登录'; $('pw').focus(); }
async function doLogin() {
  $('loginErr').textContent = '';
  const r = await apiPost('/api/login', { password: $('pw').value });
  if (r.ok) { $('login').classList.remove('show'); $('pw').value = ''; selectSection('medialib'); }
  else $('loginErr').textContent = '密码错误';
}
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ---------- 左侧导航（桌面常驻 / 移动抽屉） ----------
function buildTabs() {
  const box = $('nav'); box.innerHTML = '';
  box.appendChild(el('div', 'brand', 'DLsite 下载器'));
  SECTIONS.forEach(s => {
    const b = el('div', 'navitem' + (s.key === section ? ' active' : ''));
    b.appendChild(el('span', 'ni', s.icon || ''));
    b.appendChild(el('span', null, s.label));
    b.onclick = () => selectSection(s.key);
    box.appendChild(b);
  });
}
// 移动端抽屉开关
function toggleDrawer() {
  const open = $('nav').classList.toggle('open');
  $('drawerBackdrop').classList.toggle('show', open);
}
function closeDrawer() {
  $('nav').classList.remove('open');
  $('drawerBackdrop').classList.remove('show');
}
// 设备/窗口决定布局：iOS/Android 手机或窄窗 → 抽屉；Windows/macOS/iPadOS/平板 → 侧栏常驻
function applyLayout() {
  const ua = navigator.userAgent;
  const phone = /iPhone|iPod|Windows Phone/.test(ua) || (/Android/.test(ua) && /Mobile/.test(ua));
  const mobile = phone || window.innerWidth <= 700;
  document.body.classList.toggle('layout-mobile', mobile);
  document.body.classList.toggle('layout-desktop', !mobile);
  if (!mobile) closeDrawer();
}
window.addEventListener('resize', applyLayout);
function stopTimers() { if (pollTimer) clearInterval(pollTimer); if (usageTimer) clearInterval(usageTimer); pollTimer = usageTimer = null; }

function selectSection(key) {
  section = key; stopTimers(); closeVideo(); closeAudio(); closeDrawer();
  const s = SECTIONS.find(x => x.key === key);
  buildTabs();
  $('search').hidden = !s.root;
  $('sort').hidden = true;
  $('back').hidden = true;
  $('count').textContent = '';
  $('content').innerHTML = '';
  $('search').value = '';
  history.replaceState({ nav: true }, '');   // 重置历史基线，切换分区不累积层级
  if (s.root) { makerSort = 0; workSort = 0; stack = [{ view: s.root, ctx: {} }]; render(); }
  else if (key === 'search') renderSearch();
  else if (key === 'download') renderDownloadSection();
  else if (key === 'settings') renderSettings();
}

// ========== 卡片区（媒体库/标签/作品形式/收藏）==========
// 每深入一级 push 一个历史项：iOS/安卓的"返回"手势触发 popstate 即可逐级回退，并恢复浏览位置
function pushView(view, ctx) {
  if (stack.length) stack[stack.length - 1].scroll = window.scrollY;
  stack.push({ view, ctx: ctx || {} });
  history.pushState({ nav: true, depth: stack.length }, '');
  render();
}
async function popView() {
  if (stack.length <= 1) return false;
  stack.pop();
  const top = stack[stack.length - 1];
  await render();
  window.scrollTo(0, top.scroll || 0);   // 返回上一级后恢复之前的浏览位置
  return true;
}
window.addEventListener('popstate', () => {
  const s = SECTIONS.find(x => x.key === section);
  if (s && s.root && stack.length > 1) popView();
});
$('back').onclick = () => history.back();   // 走 popstate，与手势行为一致

async function render() {
  const st = stack[stack.length - 1];
  $('back').hidden = stack.length <= 1;
  $('sort').hidden = true;
  $('search').hidden = (st.view === 'detail' || st.view === 'files');   // 作品详情/查看作品页不显示搜索框
  $('content').innerHTML = '';
  $('count').textContent = '';
  try {
    if (st.view === 'libs') await renderLibs();
    else if (st.view === 'libview') await renderLibView(st.ctx);
    else if (st.view === 'genres') await renderGenres();
    else if (st.view === 'types') await renderTypes();
    else if (st.view === 'favorites') await renderWorks('/api/favorites', '收藏', true);
    else if (st.view === 'makers') await renderMakers(st.ctx);
    else if (st.view === 'works') await renderWorks(worksUrl(st.ctx), st.ctx.maker || '未知社团', true, st.ctx);
    else if (st.view === 'filter') await renderWorks(`/api/filter?col=${enc(st.ctx.col)}&val=${enc(st.ctx.val)}`, st.ctx.label, true);
    else if (st.view === 'detail') await renderDetail(st.ctx.id);
    else if (st.view === 'files') await renderFiles(st.ctx);
  } catch (e) { if (e.message !== 'unauth') $('content').appendChild(el('div', 'empty', '加载失败')); }
}

function setSort(options, current, onChange) {
  const s = $('sort'); s.hidden = false; s.innerHTML = '';
  options.forEach((o, i) => { const op = el('option', null, o); op.value = i; s.appendChild(op); });
  s.value = current; s.onchange = () => onChange(parseInt(s.value));
}

async function renderLibs() {
  $('title').textContent = '媒体库';
  const d = await api('/api/libs');
  curItems = d.libs.map(l => ({ ...l, _key: l.name.toLowerCase() }));
  // 进入媒体库默认显示作品（libview），而非社团
  drawGroups(curItems, l => ({ title: l.name, caption: `${l.works} 个作品 · ${l.folders} 个文件夹`, onClick: () => pushView('libview', { lib: l.name, mode: 'works' }) }), '个媒体库');
}

// 媒体库内视图：默认平铺作品，带"显示作品/显示社团"就地切换（不算一级，便于手势返回）
async function renderLibView(ctx) {
  const mode = ctx.mode || 'works';
  $('title').textContent = ctx.lib;
  if (mode === 'works') {
    setSort(WORK_SORTS, workSort, v => { workSort = v; render(); });
    const d = await api(`/api/libworks?lib=${enc(ctx.lib)}&sort=${workSort}`);
    curItems = d.works.map(w => ({ ...w, _key: `${w.id} ${w.name} ${w.maker}`.toLowerCase() }));
    drawWorks(curItems);
    prependLibToggle('🏢 显示社团', 'makers');
  } else {
    setSort(MAKER_SORTS, makerSort, v => { makerSort = v; render(); });
    const d = await api(`/api/makers?lib=${enc(ctx.lib)}&sort=${makerSort}`);
    curItems = d.makers.map(m => ({ ...m, _key: (m.maker || '未知社团').toLowerCase() }));
    drawGroups(curItems, m => ({ title: m.maker || '未知社团', caption: `${m.count} 个作品`, onClick: () => pushView('works', { lib: ctx.lib, maker: m.maker }) }), '个社团');
    prependLibToggle('▦ 显示作品', 'works');
  }
}
function prependLibToggle(label, toMode) {
  const bar = el('div', 'toolbar');
  const b = el('button', 'icon-btn', label);
  b.onclick = () => { stack[stack.length - 1].ctx.mode = toMode; render(); };  // 就地切换，不 push 新层级
  bar.appendChild(b);
  const host = $('content');
  host.insertBefore(bar, host.firstChild);
}
async function renderGenres() {
  $('title').textContent = '标签';
  const d = await api('/api/genres');
  curItems = d.genres.map(g => ({ ...g, _key: g.genre.toLowerCase() }));
  drawGroups(curItems, g => ({ title: g.genre, caption: `${g.count} 个作品`, onClick: () => pushView('makers', { genre: g.genre }) }), '个标签');
}
async function renderTypes() {
  $('title').textContent = '作品形式';
  const d = await api('/api/types');
  curItems = d.types.map(t => ({ ...t, _key: t.type.toLowerCase() }));
  drawGroups(curItems, t => ({ title: t.type, caption: `${t.count} 个作品`, onClick: () => pushView('makers', { type: t.type }) }), '个形式');
}
async function renderMakers(ctx) {
  $('title').textContent = ctx.genre || ctx.type || ctx.lib || '社团';
  setSort(MAKER_SORTS, makerSort, v => { makerSort = v; render(); });
  const q = new URLSearchParams();
  if (ctx.lib) q.set('lib', ctx.lib); if (ctx.genre) q.set('genre', ctx.genre); if (ctx.type) q.set('type', ctx.type);
  q.set('sort', makerSort);
  const d = await api('/api/makers?' + q);
  curItems = d.makers.map(m => ({ ...m, _key: (m.maker || '未知社团').toLowerCase() }));
  drawGroups(curItems, m => ({ title: m.maker || '未知社团', caption: `${m.count} 个作品`, onClick: () => pushView('works', { ...ctx, maker: m.maker }) }), '个社团');
}
function worksUrl(ctx) {
  const q = new URLSearchParams();
  if (ctx.lib) q.set('lib', ctx.lib); if (ctx.genre) q.set('genre', ctx.genre); if (ctx.type) q.set('type', ctx.type);
  q.set('maker', ctx.maker || ''); q.set('sort', workSort);
  return '/api/works?' + q;
}
async function renderWorks(url, title, sortable) {
  $('title').textContent = title;
  if (sortable) setSort(WORK_SORTS, workSort, v => { workSort = v; render(); });
  const full = url.includes('sort=') ? url : url + (url.includes('?') ? '&' : '?') + 'sort=' + workSort;
  const d = await api(full);
  curItems = d.works.map(w => ({ ...w, _key: `${w.id} ${w.name} ${w.maker}`.toLowerCase() }));
  drawWorks(curItems);
}

function filtered() { const kw = $('search').value.trim().toLowerCase(); return kw ? curItems.filter(i => i._key.includes(kw)) : curItems; }

let lastMap = null, lastUnit = '';
function drawGroups(items, mapFn, unit) {
  lastMap = mapFn; lastUnit = unit;
  const items2 = filtered();
  const works = items.reduce((s, i) => s + (i.works || i.count || 0), 0);
  $('count').textContent = $('search').value.trim() ? `共 ${items.length} ${unit}，匹配 ${items2.length} 个` : `共 ${items.length} ${unit}，${works} 个作品`;
  const grid = el('div', 'grid groups');
  items2.forEach(i => { const m = mapFn(i); const c = el('div', 'card group-card'); c.appendChild(el('div', 'gt', m.title)); c.appendChild(el('div', 'gc', m.caption)); c.onclick = m.onClick; grid.appendChild(c); });
  const host = $('content'); host.innerHTML = ''; host.appendChild(items2.length ? grid : el('div', 'empty', '没有内容'));
}
function makeWorkCard(w) {
  const c = el('div', 'card');
  const cov = el('div', 'cover');
  if (w.cover) { const img = el('img'); img.loading = 'lazy'; img.src = `/api/cover?id=${enc(w.id)}`; cov.appendChild(img); }
  cov.appendChild(el('div', 'badge rj', w.id));
  if (w.type) cov.appendChild(el('div', 'badge type', w.type));
  c.appendChild(cov); c.appendChild(el('div', 'wt', w.name || w.id));
  c.onclick = () => pushView('detail', { id: w.id });
  return c;
}
function drawWorks(items) {
  lastMap = null;
  const items2 = filtered();
  $('count').textContent = $('search').value.trim() ? `共 ${items.length} 个作品，匹配 ${items2.length} 个` : `共 ${items.length} 个作品`;
  const grid = el('div', 'grid cards');
  items2.forEach(w => grid.appendChild(makeWorkCard(w)));
  const host = $('content'); host.innerHTML = ''; host.appendChild(items2.length ? grid : el('div', 'empty', '没有内容'));
}

// 作用域作品搜索：媒体库根搜全部库 / 库内搜该库 / 标签·形式社团页搜对应分组（服务端 LIKE，对齐 WPF）
let searchGen = 0;
async function scopedWorkSearch(st, kw, gen) {
  const ctx = st.ctx || {};
  const q = new URLSearchParams(); q.set('kw', kw); q.set('sort', workSort);
  if (st.view === 'libview') { if (ctx.lib) q.set('lib', ctx.lib); }
  else if (st.view === 'makers') {
    if (ctx.genre) q.set('genre', ctx.genre);
    else if (ctx.type) q.set('type', ctx.type);
    else if (ctx.lib) q.set('lib', ctx.lib);
  }
  // libs 根：不带范围参数 → 搜全部库
  let d; try { d = await api('/api/searchworks?' + q); } catch (e) { return; }
  if (gen !== searchGen) return;   // 已有更新的搜索请求
  const works = d.works || [];
  $('sort').hidden = true;
  $('count').textContent = `搜索到 ${works.length} 个作品`;
  const grid = el('div', 'grid cards');
  works.forEach(w => grid.appendChild(makeWorkCard(w)));
  const host = $('content'); host.innerHTML = ''; host.appendChild(works.length ? grid : el('div', 'empty', '没有匹配的作品'));
}

async function renderDetail(id) {
  $('title').textContent = id; $('sort').hidden = true;
  const d = await api('/api/detail?id=' + enc(id));
  if (d.error) { $('content').appendChild(el('div', 'empty', '作品不存在')); return; }
  $('title').textContent = d.name || d.id;
  const root = el('div', 'detail');
  root.appendChild(el('h1', null, d.name || d.id));
  const top = el('div', 'dtop');
  const gallery = el('div', 'gallery');
  const imgs = d.slider.length ? d.slider.map(n => `/api/asset?id=${enc(d.id)}&name=${enc(n)}`) : (d.hasCover ? [`/api/cover?id=${enc(d.id)}`] : []);
  if (imgs.length) {
    const main = el('img', 'main'); main.src = imgs[0]; main.onclick = () => LB.open(imgs, 0); gallery.appendChild(main);
    if (imgs.length > 1) {
      const thumbs = el('div', 'thumbs');
      imgs.forEach((src, i) => { const t = el('img'); t.src = src; t.loading = 'lazy'; if (i === 0) t.className = 'sel';
        t.onclick = () => { main.src = src; main.onclick = () => LB.open(imgs, i); thumbs.querySelectorAll('img').forEach(x => x.classList.remove('sel')); t.classList.add('sel'); }; thumbs.appendChild(t); });
      gallery.appendChild(thumbs);
    }
  }
  top.appendChild(gallery);
  const fields = el('div', 'fields');
  const addF = (k, node) => { if (node == null) return; fields.appendChild(el('div', 'k', k)); const v = el('div', 'v'); if (typeof node === 'string') v.textContent = node; else v.appendChild(node); fields.appendChild(v); };
  const link = (text, col, val) => { const a = el('a', null, text); a.onclick = () => pushView('filter', { col, val, label: text }); return a; };
  const multi = (text, col, sep) => { const w = el('span'); const parts = (text || '').split(sep).map(s => s.trim()).filter(Boolean); parts.forEach((p, i) => { w.appendChild(link(p, col, p)); if (i < parts.length - 1) w.appendChild(document.createTextNode(' / ')); }); return parts.length ? w : null; };
  // 作品号：点击在新标签打开 DLsite 作品页（对齐 WPF 详情 RJ 超链接）
  const idLink = el('a', null, d.id); idLink.href = `https://www.dlsite.com/maniax/work/=/product_id/${enc(d.id)}.html`; idLink.target = '_blank'; idLink.rel = 'noopener';
  addF('作品号', idLink);
  if (d.maker) addF('社团', link(d.maker, 'maker_name', d.maker));
  if (d.sellDate) addF('販売日', d.sellDate);
  if (d.series) addF('系列', link(d.series, 'series', d.series));
  if (d.scenario) addF('剧本', link(d.scenario, 'scenario', d.scenario));
  if (d.illust) addF('插画', link(d.illust, 'illust', d.illust));
  if (d.voiceActor) addF('声优', multi(d.voiceActor, 'voice_actor', '/'));
  if (d.age) addF('年龄分级', link(d.ageText || AGE[d.age] || d.age, 'age_category', d.age));
  if (d.workType) addF('作品形式', d.workType);
  if (d.tags && d.tags.length) { const box = el('span'); d.tags.forEach(t => { const a = el('a', 'tag', t); a.onclick = () => { section = 'tag'; buildTabs(); $('search').hidden = false; stack = [{ view: 'genres', ctx: {} }]; pushView('makers', { genre: t }); }; box.appendChild(a); }); addF('类型', box); }
  if (d.fileSize) addF('文件容量', d.fileSize);
  if (d.intro) addF('简介', d.intro);
  top.appendChild(fields); root.appendChild(top);

  const actions = el('div', 'actions');
  const rb = el('button', 'toggle' + (d.read ? ' on' : ''), (d.read ? '★ ' : '☆ ') + '已读');
  rb.onclick = async () => { const r = await apiPost('/api/toggle', { id: d.id, field: 'read', value: !d.read }); d.read = r.value; rb.className = 'toggle' + (d.read ? ' on' : ''); rb.textContent = (d.read ? '★ ' : '☆ ') + '已读'; };
  const fb = el('button', 'toggle' + (d.favorite ? ' on' : ''), (d.favorite ? '♥ ' : '♡ ') + '收藏');
  fb.onclick = async () => { const r = await apiPost('/api/toggle', { id: d.id, field: 'favorite', value: !d.favorite }); d.favorite = r.value; fb.className = 'toggle' + (d.favorite ? ' on' : ''); fb.textContent = (d.favorite ? '♥ ' : '♡ ') + '收藏'; };
  actions.appendChild(rb); actions.appendChild(fb);
  if (d.hasFiles) {
    const vb = el('button', 'toggle', '📂 查看作品'); vb.onclick = () => pushView('files', { id: d.id, name: d.name || d.id }); actions.appendChild(vb);
    // 移动媒体库：选择目标库/文件夹 → 移动文件夹并改库（对齐 WPF 详情"移动媒体库"）
    const mb = el('button', 'toggle', '📦 移动媒体库');
    mb.onclick = async () => {
      const t = await api('/api/downtargets');
      if (!t.libs || !t.libs.length) { alert('尚未配置媒体库文件夹（请在桌面端添加）'); return; }
      const target = await pickTarget(t.libs);
      if (!target) return;
      if (!confirm(`确定将 ${d.id} 移动到媒体库“${target.lib}”吗？`)) return;
      mb.disabled = true; mb.textContent = '移动中…';
      const r = await apiPost('/api/movework', { id: d.id, lib: target.lib, folder: target.folder });
      alert(r.ok ? '已移动到新媒体库' : ('移动失败：' + (r.message || '')));
      if (r.ok) render(); else { mb.disabled = false; mb.textContent = '📦 移动媒体库'; }
    };
    actions.appendChild(mb);
  }
  root.appendChild(actions);

  if (d.body && d.body.length) {
    const body = el('div', 'body'); const bodyImgs = [];
    d.body.forEach(b => { if (b.kind === 'image') bodyImgs.push(`/api/asset?id=${enc(d.id)}&name=${enc(b.value)}`); });
    let ix = 0;
    d.body.forEach(b => {
      if (b.kind === 'text') { if (b.value.trim()) body.appendChild(el('p', null, b.value)); }
      else { const img = el('img'); img.src = `/api/asset?id=${enc(d.id)}&name=${enc(b.value)}`; img.loading = 'lazy'; const idx = ix++; img.onclick = () => LB.open(bodyImgs, idx); body.appendChild(img); }
    });
    root.appendChild(body);
  }
  const host = $('content'); host.innerHTML = ''; host.appendChild(root); window.scrollTo(0, 0);
}

// ========== 搜索 ==========
function renderSearch() {
  $('title').textContent = '搜索';
  // 重置社团状态：让可能残留的后台扫描循环（makerState !== s）自行停止
  if (makerState && makerState.io) makerState.io.disconnect();
  makerState = null;
  const host = $('content'); host.innerHTML = '';
  const bar = el('div', 'toolbar');
  const inp = el('input'); inp.placeholder = '作品号(RJ/BJ/VJ)、社团号(RG) 或 DLsite 链接'; inp.className = 'grow'; inp.id = 'sId';
  const btn = el('button', 'icon-btn primary', '查询');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  btn.onclick = runSearch;
  bar.appendChild(inp); bar.appendChild(btn);
  host.appendChild(bar);

// 识别输入：作品号 / 社团号 / DLsite 链接
function parseInput(raw) {
  raw = (raw || '').trim();
  let m = raw.match(/product_id\/((?:RJ|BJ|VJ)\d+)/i); if (m) return { kind: 'work', id: m[1].toUpperCase() };
  m = raw.match(/maker_id\/(RG\d+)/i); if (m) return { kind: 'maker', id: m[1].toUpperCase() };
  const up = raw.toUpperCase();
  if (/^(?:RJ|BJ|VJ)\d+$/.test(up)) return { kind: 'work', id: up };
  if (/^RG\d+$/.test(up)) return { kind: 'maker', id: up };
  return { kind: 'invalid', id: '' };
}
async function runSearch() {

  if (p.kind !== 'work') { showWorkPane(); $('workPane').innerHTML = '<div class="empty">请输入作品号(RJ/BJ/VJ)、社团号(RG) 或 DLsite 链接</div>'; return; }

let workGen = 0;

// 从上到下自动扫描帖子，命中含有效下载的帖子即停止
async function autoScanPosts(id, gen, posts) {
  for (const post of posts) {
    if (gen !== workGen) return;

    if (gen !== workGen) return;
    if (valid) return;
  }
}
// 扫描单个帖子：抓网盘链接 → 内联展示 → 检测；存在有效网盘则返回 true 并可直接下载
async function scanPost(id, post, gen) {
  post.scanning = true;
  post.statusEl.textContent = '扫描中…'; post.statusEl.style.color = 'var(--muted)';
  let d;
  try { d = await api('/api/posturls?url=' + enc(post.url)); } catch (e) { post.scanning = false; return false; }
  if (gen !== workGen) { post.scanning = false; return false; }
  post.hostsEl.innerHTML = '';
  if (d.error || !d.hosts || !d.hosts.length) {
    post.statusEl.textContent = '无下载链接'; post.statusEl.style.color = 'var(--muted)';
    post.scanned = true; post.scanning = false; return false;
  }
  post.statusEl.textContent = '检测中…';
  const checks = d.hosts.map(h => {
    const c = el('div', 'host');
    c.appendChild(el('div')).append(el('div', 'hn', h.host), el('div', 'hc', `${h.count} 个文件`));
    const st = el('div', 'hs'); st.innerHTML = '<span class="spin"></span> 检测中…'; c.appendChild(st);
    post.hostsEl.appendChild(c);
    return apiPost('/api/checkhost', { urls: h.urls }).then(res => {
      if (gen !== workGen) return false;
      if (res.status === 'valid') { st.textContent = '点击下载'; st.style.color = '#4ade80'; c.classList.add('ok'); c.onclick = (ev) => { ev.stopPropagation(); enqueue(id, h.urls, c, st); }; return true; }
      if (res.status === 'invalid') { st.textContent = '失效'; st.style.color = '#f87171'; return false; }
      st.textContent = `部分有效 ${res.valid}/${res.total}`; st.style.color = '#facc15'; return false;
    }).catch(() => { st.textContent = '检测失败'; st.style.color = '#f87171'; return false; });
  });
  const results = await Promise.all(checks);
  if (gen !== workGen) { post.scanning = false; return false; }
  const anyValid = results.some(Boolean);
  post.statusEl.textContent = anyValid ? '有有效下载' : '无有效下载';
  post.statusEl.style.color = anyValid ? '#4ade80' : '#facc15';
  post.scanned = true; post.scanning = false;
  return anyValid;
}

// 社团（RG）搜索：作品缩略图网格 + 下拉到底自动加载下一页

async function loadMakerPage() {

// 把下载列表聚合状态写回社团卡片角标（每秒，镜像 /api/downloads 的分组状态），无活动下载即止
async function startMakerDownPoll() {
  const s = makerState;
  if (!s || s.dlPolling) return;
  s.dlPolling = true;
  while (true) {
    if (makerState !== s || section !== 'search') break;
    let d;
    try { d = await api('/api/downloads'); } catch (e) { break; }
    if (makerState !== s) break;
    const map = {}; (d.groups || []).forEach(g => { map[g.id] = g; });
    Object.keys(s.cards).forEach(id => {
      const g = map[id]; if (!g) return;
      const b = s.cards[id];
      b.dataset.dl = '1';
      b.textContent = g.statusText;
      b.style.background = 'rgba(0,0,0,.72)';
      b.style.color = g.color;
      const card = b.closest('.card'); if (card) card.classList.remove('dim');

    if (!(d.groups || []).length) break;   // 无活动下载则停止轮询

// 对未在库作品按 3 秒间隔逐个扫描 AS 论坛，把结果写回卡片角标
async function runMakerScans() {

  while (s.scanQueue.length) {

    else if (d.count === 0) { st.textContent = 'AS · 无'; st.style.background = 'rgba(0,0,0,.62)'; }
    else { st.textContent = 'AS · 失败'; st.style.background = 'rgba(180,60,60,.88)'; }
    if (s.scanQueue.length) await new Promise(r => setTimeout(r, 3000));   // 仅在还有待扫描项时间隔等待

}

// ========== 查看作品（文件树）==========
function fmtSize(b) {
  if (b >= 1073741824) return (b / 1073741824).toFixed(2) + ' GB';
  if (b >= 1048576) return (b / 1048576).toFixed(1) + ' MB';
  if (b >= 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b || 0) + ' B';
}
function fileIcon(ext) {
  if (IMG_EXTS.includes(ext)) return '🖼️';
  if (VIDEO_EXTS.includes(ext)) return '🎬';
  if (AUDIO_EXTS.includes(ext)) return '🎵';
  return '📄';
}
// 查看作品视图模式：thumb=缩略图网格 / list=文件列表（折叠树+文件大小，对齐 WPF）
let fileViewMode = 'thumb';
// 文件夹进入时携带子节点（ctx.nodes），无则首次拉取整棵树
async function renderFiles(ctx) {
  $('title').textContent = ctx.name || ctx.id;
  const host = $('content');
  let nodes = ctx.nodes;
  if (!nodes) {
    host.innerHTML = '<div class="empty"><span class="spin"></span> 加载中…</div>';
    let d; try { d = await api('/api/files?id=' + enc(ctx.id)); } catch (e) { return; }
    if (d.error) { host.innerHTML = ''; host.appendChild(el('div', 'empty', d.error)); return; }
    nodes = d.nodes || [];
  }
  ctx.nodes = nodes;   // 缓存：切换视图无需重新请求
  host.innerHTML = '';
  // 视图切换栏：缩略图 / 文件列表
  const bar = el('div', 'toolbar');
  const tb = el('button', 'icon-btn' + (fileViewMode === 'thumb' ? ' primary' : ''), '▦ 缩略图');
  const lb = el('button', 'icon-btn' + (fileViewMode === 'list' ? ' primary' : ''), '☰ 文件列表');
  tb.onclick = () => { if (fileViewMode !== 'thumb') { fileViewMode = 'thumb'; renderFiles(ctx); } };
  lb.onclick = () => { if (fileViewMode !== 'list') { fileViewMode = 'list'; renderFiles(ctx); } };
  bar.append(tb, lb); host.appendChild(bar);
  if (!nodes.length) { host.appendChild(el('div', 'empty', '此文件夹为空')); return; }
  host.appendChild(fileViewMode === 'list' ? drawFileTree(nodes, ctx.id) : drawFileGrid(nodes, ctx.id));
}
// 文件列表视图：递归折叠树，文件夹默认收起，文件显示类型图标+名称+大小（镜像 WPF 文件列表）
function drawFileTree(nodes, id) {
  const wrap = el('div', 'tree');
  buildTreeLevel(wrap, nodes, id, 0);
  return wrap;
}
function buildTreeLevel(host, nodes, id, depth) {
  nodes.forEach(n => {
    const ext = (n.ext || '').toLowerCase();
    if (n.dir) {
      const row = el('div', 'trow'); row.style.paddingLeft = (8 + depth * 18) + 'px';
      const arrow = el('span', 'arrow', '▸');
      row.append(arrow, el('span', 'ticon', '📁'), el('span', 'tname', n.name), el('span', 'tsize', `${(n.children || []).length} 项`));
      const childBox = el('div'); childBox.style.display = 'none';
      let built = false, open = false;
      row.onclick = () => {
        open = !open; arrow.textContent = open ? '▾' : '▸';
        if (open && !built) { buildTreeLevel(childBox, n.children || [], id, depth + 1); built = true; }
        childBox.style.display = open ? '' : 'none';
      };
      host.append(row, childBox);
    } else {
      const row = el('div', 'trow file'); row.style.paddingLeft = (8 + depth * 18 + 18) + 'px';
      row.append(el('span', 'ticon', fileIcon(ext)), el('span', 'tname', n.name), el('span', 'tsize', fmtSize(n.size)));
      const url = fileUrl(id, n.rel);
      if (IMG_EXTS.includes(ext)) {
        const sib = nodes.filter(x => !x.dir && IMG_EXTS.includes((x.ext || '').toLowerCase())).map(x => fileUrl(id, x.rel));
        row.onclick = () => LB.open(sib, Math.max(0, sib.indexOf(url)));
      } else if (VIDEO_EXTS.includes(ext)) {
        const q = nodes.filter(x => !x.dir && VIDEO_EXTS.includes((x.ext || '').toLowerCase())).map(x => ({ url: fileUrl(id, x.rel), name: x.name }));
        row.onclick = () => playVideoQueue(q, Math.max(0, q.findIndex(v => v.url === url)));
      } else if (AUDIO_EXTS.includes(ext)) {
        const q = nodes.filter(x => !x.dir && AUDIO_EXTS.includes((x.ext || '').toLowerCase())).map(x => ({ url: fileUrl(id, x.rel), name: x.name }));
        row.onclick = () => playAudioQueue(q, Math.max(0, q.findIndex(a => a.url === url)));
      } else {
        row.onclick = () => window.open(url, '_blank');
      }
      host.appendChild(row);
    }
  });
}
function drawFileGrid(nodes, id) {
  // 本层图片集合：图片缩略图点开后可在它们之间左右滑动
  const imgs = nodes.filter(n => !n.dir && IMG_EXTS.includes((n.ext || '').toLowerCase())).map(n => fileUrl(id, n.rel));
  // 本层音频/视频集合：组成播放队列，支持上一/下一与自动续播（nodes 已按名称排序）
  const audios = nodes.filter(n => !n.dir && AUDIO_EXTS.includes((n.ext || '').toLowerCase())).map(n => ({ url: fileUrl(id, n.rel), name: n.name }));
  const videos = nodes.filter(n => !n.dir && VIDEO_EXTS.includes((n.ext || '').toLowerCase())).map(n => ({ url: fileUrl(id, n.rel), name: n.name }));
  const grid = el('div', 'fgrid');
  nodes.forEach(n => {
    const ext = (n.ext || '').toLowerCase();
    const card = el('div', 'fcard');
    const thumb = el('div', 'fthumb');
    if (n.dir) {
      thumb.appendChild(el('div', 'big', '📁'));
      thumb.appendChild(el('div', 'fcount', `${(n.children || []).length} 项`));
      card.onclick = () => pushView('files', { id, name: n.name, nodes: n.children || [] });
    } else if (IMG_EXTS.includes(ext)) {
      const img = el('img'); img.loading = 'lazy'; img.src = fileUrl(id, n.rel); thumb.appendChild(img);
      const url = fileUrl(id, n.rel);
      card.onclick = () => LB.open(imgs, Math.max(0, imgs.indexOf(url)));
    } else if (VIDEO_EXTS.includes(ext)) {
      thumb.appendChild(el('div', 'big', '🎬'));
      const url = fileUrl(id, n.rel);
      card.onclick = () => playVideoQueue(videos, Math.max(0, videos.findIndex(v => v.url === url)));
    } else if (AUDIO_EXTS.includes(ext)) {
      thumb.appendChild(el('div', 'big', '🎵'));
      const url = fileUrl(id, n.rel);
      card.onclick = () => playAudioQueue(audios, Math.max(0, audios.findIndex(a => a.url === url)));
    } else {
      thumb.appendChild(el('div', 'big', '📄'));
      card.onclick = () => window.open(fileUrl(id, n.rel), '_blank');
    }
    card.append(thumb, el('div', 'fname', n.name));
    grid.appendChild(card);
  });
  return grid;
}
// ---------- 视频播放队列 ----------
let videoQueue = [], videoIndex = -1;
function playVideoQueue(queue, index) {
  videoQueue = queue || []; videoIndex = index;
  if (!videoQueue.length) return;
  $('videoOverlay').classList.add('show');
  playVideoAt(index);
}
function playVideoAt(i) {
  if (i < 0 || i >= videoQueue.length) return;
  videoIndex = i;
  const it = videoQueue[i], v = $('vplayer');
  v.src = it.url; v.play().catch(() => {});
  $('vtitle').textContent = it.name + (videoQueue.length > 1 ? `　${i + 1} / ${videoQueue.length}` : '');
  $('vprev').disabled = videoIndex <= 0;
  $('vnext').disabled = videoIndex >= videoQueue.length - 1;
}
function videoPrev() { if (videoIndex > 0) playVideoAt(videoIndex - 1); }
function videoNext() { if (videoIndex < videoQueue.length - 1) playVideoAt(videoIndex + 1); }   // 到队尾即停
function closeVideo() {
  const v = $('vplayer'); v.pause(); v.removeAttribute('src'); v.load();
  $('videoOverlay').classList.remove('show'); videoQueue = []; videoIndex = -1;
}
$('vplayer').addEventListener('ended', videoNext);   // 自然结束自动续播下一个
$('videoOverlay').addEventListener('click', e => { if (e.target.id === 'videoOverlay') closeVideo(); });

// ---------- 音频播放队列 ----------
let audioQueue = [], audioIndex = -1;
function playAudioQueue(queue, index) {
  audioQueue = queue || []; audioIndex = index;
  if (!audioQueue.length) return;
  $('audioBar').classList.add('show');

}
function playAudioAt(i) {
  if (i < 0 || i >= audioQueue.length) return;

  const it = audioQueue[i], a = $('aplayer');
  $('aname').textContent = it.name;
  a.src = it.url; a.play().catch(() => {});

}
function audioPrev() {
  const a = $('aplayer');

  if (a.currentTime > 3 || audioIndex <= 0) { a.currentTime = 0; a.play().catch(() => {}); return; }
  playAudioAt(audioIndex - 1);
}

// 睡眠定时（到点后不打断当前曲：本曲放完即停，不再续播下一条）
const SLEEP_PRESETS = [['15 分钟', 15], ['30 分钟', 30], ['45 分钟', 45], ['60 分钟', 60], ['90 分钟', 90]];
let sleepTimer = null, sleepUntil = 0, stopAfterCurrent = false;
function toggleSleepMenu() {
  const m = $('sleepMenu');
  $('audioPlaylist').classList.remove('show');
  if (m.classList.contains('show')) { m.classList.remove('show'); return; }
  m.innerHTML = '';
  // 手动输入分钟数
  const ic = el('div', 'sleep-input');
  const inp = el('input'); inp.type = 'number'; inp.min = '1'; inp.placeholder = '自定义分钟';
  inp.onkeydown = e => { if (e.key === 'Enter') confirmManual(); };
  const ok = el('button', null, '确定'); ok.onclick = confirmManual;
  function confirmManual() {
    const v = parseInt(inp.value, 10);
    if (v > 0) { m.classList.remove('show'); setSleep(v); }
  }
  ic.appendChild(inp); ic.appendChild(ok); m.appendChild(ic);
  // 关闭定时
  addSleepRow(m, '关闭定时', () => clearSleep());
  // 播放完当前（本曲放完即停）
  addSleepRow(m, '播放完当前', () => stopAtCurrentEnd());
  // 预设档位
  SLEEP_PRESETS.forEach(([label, mins]) => addSleepRow(m, label, () => setSleep(mins)));
  m.classList.add('show');
  inp.focus();
}
function addSleepRow(m, label, fn) {
  const r = el('div', 'aprow'); r.appendChild(el('span', 'apt', label));
  r.onclick = () => { m.classList.remove('show'); fn(); };
  m.appendChild(r);
}
function setSleep(mins) {
  clearSleep();
  if (mins <= 0) return;
  sleepUntil = Date.now() + mins * 60000;
  sleepTimer = setInterval(tickSleep, 1000);
  updateSleepBtn();
}
function tickSleep() {
  if (sleepUntil - Date.now() <= 0) {        // 到点：不打断当前曲，待其播完即停
    if (sleepTimer) clearInterval(sleepTimer);
    sleepTimer = null; sleepUntil = 0;
    stopAtCurrentEnd();
    return;
  }
  updateSleepBtn();
}
function stopAtCurrentEnd() {
  stopAfterCurrent = true;
  const b = $('asleepBtn'); b.textContent = '⏹'; b.title = '本曲放完即停'; b.classList.add('on');
}
function updateSleepBtn() {
  const remain = Math.max(0, sleepUntil - Date.now());
  const mm = Math.floor(remain / 60000), ss = Math.floor((remain % 60000) / 1000);
  const b = $('asleepBtn'); b.textContent = `${mm}:${String(ss).padStart(2, '0')}`; b.classList.add('on');
}
function clearSleep() {
  if (sleepTimer) clearInterval(sleepTimer);
  sleepTimer = null; sleepUntil = 0; stopAfterCurrent = false;
  const b = $('asleepBtn'); b.textContent = '⏱'; b.title = '睡眠定时'; b.classList.remove('on');
}

// ---------- 灯箱 ----------

  close() { $('lightbox').classList.remove('show'); $('lbimg').src = ''; },
  step(d) { if (!this.list.length) return; this.idx = (this.idx + d + this.list.length) % this.list.length; $('lbimg').src = this.list[this.idx]; },
};
$('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') LB.close(); });
// 触屏左右滑动切换图片：右滑看上一张、左滑看下一张

    }
    if (['works', 'favorites', 'filter'].includes(v)) drawWorks(curItems);
    else if (lastMap) drawGroups(curItems, lastMap, lastUnit);
  }, 200);
});

// ---------- 启动 ----------
async function boot() {
  applyLayout();
  buildTabs();
  try { const s = await fetch('/api/state').then(r => r.json()); if (s.needLogin) { showLogin(true); return; } } catch (e) {}
  selectSection('medialib');
}
boot();
</script>
